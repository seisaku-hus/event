name: Collect HUS Event URLs

on:
  schedule:
    # 毎日 6:00 JST（= 21:00 UTC）
    - cron: '0 21 * * *'
  workflow_dispatch: {}  # 手動実行用ボタンも有効化

permissions:
  contents: write  # git push に必要

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run collector
        run: python collect_urls.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add event_urls.json
          git diff --cached --quiet || git commit -m "Update event_urls.json"
          git push
